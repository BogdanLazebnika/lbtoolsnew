<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Tools</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/header.css">
</head>
<body class="fade-in">

    <!-- Шапка -->
    <header id="header" class="site-header"></header>

    <!-- Основний контент -->
    <main id="main-content">
        <div class="content">
            <h1>Привіт, світ!</h1>

            <svg class="icon" aria-hidden="true">
                <use href="assets/img/icons/icons.svg#compress-pdf-outline-ico"></use>
            </svg>

            



            <div class="container">
                <h1>Додатки для обробки медіа</h1>
            

                <!-- Футер - випадаючі категорії -->
                <section class="footer-links">
                    <h2 class="section-title">⭐ Всі додатки</h2>
                    <div data-links="footer"></div>
                </section>

                <!-- Список всіх додатків з групуванням по категоріях -->
                <section>
                    <h2 class="section-title">📋 Всі додатки</h2>
                    <div class="apps-container" data-links="all"></div>
                </section>


                <!-- Категорія окремо -->
                <section>
                    <h2 class="section-title">📷 Додатки для зображень</h2>
                    <div class="simple-list" data-links="category" data-category="images"></div>
                </section>

                <!-- Пов'язані додатки -->
                <section>
                    <h2 class="section-title">🔗 Схожі додатки</h2>
                    <div class="simple-list" data-links="related" data-category="images" data-current="compress-image"></div>
                </section>
            </div>

            
    </main>

    <!-- Футер -->
    <footer id="footer" class="site-footer"></footer>

    <script src="assets/js/appsData.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
