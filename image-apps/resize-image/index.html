<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Tools</title>

    <!-- 1️⃣ БАЗА ДЛЯ ВСІХ СТОРІНОК  -->
    <!-- Якщо ваш проєкт розміщений у підкаталозі /lbtoolsnew/ -->
    <script>
        (function () {
            // -------------------------------------------------
            // 1️⃣ Отримуємо абсолютний URL скрипта, який зараз виконується.
            //    У сучасних браузерах це document.currentScript.src.
            //    Для старих – fallback до останнього <script> у DOM.
            // -------------------------------------------------
            const scriptUrl = document.currentScript?.src ||
                (function () {
                    const scripts = document.getElementsByTagName('script');
                    return scripts[scripts.length - 1].src;
                })();

            // -------------------------------------------------
            // 2️⃣ Видаляємо назву файлу → залишаємо лише каталог скрипта.
            //    Приклад:  https://example.com/xyz/assets/js/base.js
            //    →         https://example.com/xyz/assets/js/
            // -------------------------------------------------
            let baseHref = scriptUrl.replace(/[^/]*$/, '');

            // -------------------------------------------------
            // 3️⃣ Тепер "відрізаємо" частину шляху, в якій живуть ваші ресурси.
            //    У більшості проєктів це "/assets/js/", "/static/js/",
            //    "/public/js/" – залишаємо тільки шлях до кореня
            //    проекту (може бути просто "/").
            //    Якщо ваш скрипт лежить в іншій папці – поправте RegExp.
            // -------------------------------------------------
            baseHref = baseHref.replace(/\/(assets|static|public)\/js\/?$/i, '/');

            // Якщо скрипт був у корені (наприклад https://example.com/base.js)
            // залишаємо простий слеш.
            if (!baseHref) baseHref = '/';

            // -------------------------------------------------
            // 4️⃣ Створюємо <base> і вставляємо його **першим** у <head>.
            // -------------------------------------------------
            const baseEl = document.createElement('base');
            baseEl.href = baseHref;               // ← правильний префікс
            const head   = document.head;
            head.insertBefore(baseEl, head.firstChild);
        })();
    </script>

    <!-- Після <base> ВСІ відносні посилання підставляються до нього -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>

<body class="fade-in">

    <!-- Шапка -->
    <header id="header" class="site-header"></header>

    <!-- Основний контент -->
    <main id="main-content">
        <div class="content">
            <h1>Привіт, світ!</h1>

            <svg class="icon" aria-hidden="true">
                <use href="assets/img/icons/icons.svg#compress-pdf-outline-ico"></use>
            </svg>

            



            <div class="container">
                <h1>Додатки для обробки медіа</h1>
            
                <!-- Список всіх додатків з групуванням по категоріях -->
                <section>
                    <h2 class="section-title">📋 Всі додатки</h2>
                    <div class="apps-container" data-links="all"></div>
                </section>


                <!-- Категорія окремо -->
                <section>
                    <h2 class="section-title">📷 Додатки для зображень</h2>
                    <div class="simple-list" data-links="category" data-category="images"></div>
                </section>

                <!-- Пов'язані додатки -->
                <section>
                    <h2 class="section-title">🔗 Схожі додатки</h2>
                    <div class="simple-list" data-links="related" data-category="images" data-current="compress-image"></div>
                </section>
            </div>

            
    </main>

    <!-- Футер -->
    <footer id="footer" class="site-footer"></footer>

    <script src="assets/js/appsData.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
