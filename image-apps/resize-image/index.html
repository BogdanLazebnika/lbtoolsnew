<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Tools</title>

    <!-- 1️⃣ БАЗА ДЛЯ ВСІХ СТОРІНОК  -->
    <!-- Якщо ваш проєкт розміщений у підкаталозі /lbtoolsnew/ -->
    <script>
        (function () {
            /**
             * Що робимо:
             * 1️⃣ Пошук у URL‑і частини, що вказує на корінь вашого
             *    проєкту (наприклад /lbtoolsnew/ або /demo/).
             * 2️⃣ Якщо проєкт перебуває у корені – береться "/".
             * 3️⃣ Створюємо <base> і вставляємо його **першим** елементом
             *    у <head>, ще до будь‑яких <link> і <script>.
             */

            // -------------- 1️⃣ Вкажіть тут усі можливі підкаталоги
            //    (ті, в яких ваш сайт може бутит розгорнутий)
            const KNOWN_SUBFOLDERS = ['lbtoolsnew'];   // <-- додайте, якщо треба

            // -------------- 2️⃣ Поточний шлях до каталогу файлу
            const dirPath = location.pathname.replace(/[^/]*$/, ''); // "/foo/bar/" → "/foo/bar/"

            // -------------- 3️⃣ Визначаємо базовий URL
            let baseHref = '/';                         // за замовчуванням – корінь домену

            for (const sub of KNOWN_SUBFOLDERS) {
                const idx = dirPath.indexOf(`/${sub}/`);
                if (idx !== -1) {
                    // Взяти частину шляху **до** підкаталогу включно
                    baseHref = dirPath.slice(0, idx + sub.length + 1);
                    break;
                }
            }

            // -------------- 4️⃣ Додаємо <base>
            const baseEl = document.createElement('base');
            baseEl.href = baseHref;                 // наприклад "/lbtoolsnew/"
            document.head.insertBefore(baseEl, document.head.firstChild);
        })();
    </script>

    <!-- Після <base> ВСІ відносні посилання підставляються до нього -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>

    <!-- Основний контент -->

            <svg class="icon" aria-hidden="true">

            </svg>

            



            <div class="container">
                <h1>Додатки для обробки медіа</h1>
            
                <!-- Список всіх додатків з групуванням по категоріях -->
                <section>
                    <h2 class="section-title">📋 Всі додатки</h2>
                    <div class="apps-container" data-links="all"></div>
                </section>


                <!-- Категорія окремо -->

                <!-- Пов'язані додатки -->

                    <div class="simple-list" data-links="related" data-category="images" data-current="compress-image"></div>
                </section>
            </div>

            
    </main>

    <!-- Футер -->
    <footer id="footer" class="site-footer"></footer>

    <script src="assets/js/appsData.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
