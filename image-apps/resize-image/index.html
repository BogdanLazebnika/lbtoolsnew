<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LB Tools</title>

    <!-- 1️⃣ БАЗА ДЛЯ ВСІХ СТОРІНОК  -->
    <!-- Якщо ваш проєкт розміщений у підкаталозі /lbtoolsnew/ -->
    <script>
        (function () {
            // 1️⃣ Яка частина URL – це «кореневий каталог» вашого сайту?
            //    Якщо ваш проєкт розміщений у підкаталозі, наприклад /lbtoolsnew/,
            //    то вказуєте його ім’я у масиві `KNOWN_SUBFOLDERS`.
            //    Якщо сайт живе в корені – масив пустий.
            const KNOWN_SUBFOLDERS = ['lbtoolsnew']; // <-- додайте сюди ваші підкаталоги

            // 2️⃣ Поточний шлях без назви файлу (тобто каталог, в якому
            //    знаходиться цей HTML‑файл)
            const dirPath = location.pathname.replace(/[^/]*$/, ''); // "/foo/bar/" → "/foo/bar/"

            // 3️⃣ Шукаємо, чи dirPath містить один із відомих підкаталогів.
            //    Якщо так – робимо його базою, інакше – корінь "/".
            let baseHref = '/';
            for (const sub of KNOWN_SUBFOLDERS) {
                const idx = dirPath.indexOf(`/${sub}/`);
                if (idx !== -1) {
                    // Взяти частину шляху до кінця підкаталогу включно
                    baseHref = dirPath.slice(0, idx + sub.length + 1);
                    break;
                }
            }

            // 4️⃣ Створюємо <base> і вставляємо його на початок <head>
            const baseEl = document.createElement('base');
            baseEl.href = baseHref;
            // Вставляємо **першим** елементом у <head>, ще до
            // будь‑яких <link> чи <script>.
            const head = document.head;
            head.insertBefore(baseEl, head.firstChild);
        })();
    </script>

    <!-- Якщо проєкт уже в корені домену (продакшн) -->
    <!-- <base href="/"> -->

    <!-- Після <base> ВСІ відносні посилання будуть склеюватись з нею -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>

<body class="fade-in">

    <!-- Шапка -->
    <header id="header" class="site-header"></header>

    <!-- Основний контент -->
    <main id="main-content">
        <div class="content">
            <h1>Привіт, світ!</h1>

            <svg class="icon" aria-hidden="true">
                <use href="assets/img/icons/icons.svg#compress-pdf-outline-ico"></use>
            </svg>

            



            <div class="container">
                <h1>Додатки для обробки медіа</h1>
            
                <!-- Список всіх додатків з групуванням по категоріях -->
                <section>
                    <h2 class="section-title">📋 Всі додатки</h2>
                    <div class="apps-container" data-links="all"></div>
                </section>


                <!-- Категорія окремо -->
                <section>
                    <h2 class="section-title">📷 Додатки для зображень</h2>
                    <div class="simple-list" data-links="category" data-category="images"></div>
                </section>

                <!-- Пов'язані додатки -->
                <section>
                    <h2 class="section-title">🔗 Схожі додатки</h2>
                    <div class="simple-list" data-links="related" data-category="images" data-current="compress-image"></div>
                </section>
            </div>

            
    </main>

    <!-- Футер -->
    <footer id="footer" class="site-footer"></footer>

    <script src="assets/js/appsData.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
